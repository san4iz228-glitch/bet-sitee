<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Demo Ставки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Демо Сайт Ставок</h1>

        <div id="auth">
            <h2>Реєстрація / Вхід</h2>
            <input type="text" id="username" placeholder="Ім'я користувача">
            <button onclick="register()">Зареєструватися</button>
            <button onclick="login()">Увійти</button>
        </div>

        <div id="dashboard" style="display:none;">
            <h2>Привіт, <span id="user-name"></span></h2>
            <p>Баланс: $<span id="balance">0</span></p>
            <button onclick="logout()">Вийти</button>

            <h3>Доступні події</h3>
            <div id="events">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
